<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vue Basics</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Jost:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <script src="https://unpkg.com/vue@3.4.9/dist/vue.global.js" defer></script>
    <script src="app.js" defer></script>
  </head>
  <body>
    <header>
      <h1>Monster Slayer</h1>
    </header>
    <div id="game">
      <section id="monster" class="container">
        <h2>Monster Health</h2>
        <div class="healthbar">
          <div class="healthbar__value" :style="monsterBar"></div>
        </div>
      </section>
      <section id="player" class="container">
        <h2>Your Health</h2>
        <div class="healthbar">
          <div class="healthbar__value" :style="userBar"></div>
        </div>
      </section>
      <section v-if="end" class="container">
        <h2>Game Over!</h2>
        <h3 v-if="end === 'd'">It's a draw!</h3>
        <h3 v-else-if="end === 'w'">You win!</h3>
        <h3 v-else>You lose!</h3>
        <button @click="newGame">Start New Game</button>
      </section>
      <section v-else id="controls">
        <button @click="attackMonster">ATTACK</button>
        <button :disabled="isDisabled" @click="specialAttack">SPECIAL ATTACK</button>
        <button :disabled="isDisabled" @click="heal">HEAL</button>
        <button @click="surrend">SURRENDER</button>
      </section>
      <section id="log" class="container">
        <h2>Battle Log</h2>
        <ul>
          <li v-for="log in logs" :key="log">
            <p>
              <span
                :class="{'log--player': log.who === 'user', 'log--monster': log.who === 'monster'}"
                >{{log.who === 'user' ? 'Player' : 'Monster'}}</span
              >
              <span v-if="log.action === 'heals'">
                heals himself for <span class="log--heal">{{log.actionValue}}</span></span
              >
              <span v-else> attaks for <span class="log--damage">{{log.actionValue}}</span></span>
              HP
            </p>
          </li>
        </ul>
      </section>
    </div>
  </body>
</html>
